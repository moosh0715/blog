<!doctype html>
<html lang="{{ site.lang | default: 'ko' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#f7f9fc">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">SIGNAL / NOTES</a>
    <nav aria-label="주요 메뉴">
      <a href="{{ '/' | relative_url }}#posts">글</a>
      <a href="{{ '/' | relative_url }}#tags">태그</a>
      <a href="{{ '/' | relative_url }}#about">소개</a>
    </nav>
  </header>
  {{ content }}
  <script src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
</body>
</html>
